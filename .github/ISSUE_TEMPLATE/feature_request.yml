name: 功能建议
description: 提出有明确用户价值和边界的改进建议
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        请描述问题和使用场景，而不是仅给出实现名称。不要附上真实邮件、账户、附件、令牌或密码。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 哪类用户在什么场景下遇到什么阻碍？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的体验或行为
      description: 说明用户可见结果、关键状态和失败时的期望。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 可选。说明当前工作流、服务商限制或已有工具为何不够。
  - type: dropdown
    id: area
    attributes:
      label: 相关领域
      options:
        - 邮箱接入或 OAuth
        - 收件箱、阅读或搜索
        - 撰写、草稿或发送状态
        - 设置、通知或桌面集成
        - 隐私、安全或本地数据
        - 发布、安装或更新
        - 文档或其他
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 数据边界确认
      options:
        - label: 此建议不要求提交或暴露真实邮件、凭据、令牌或个人信息。
          required: true
